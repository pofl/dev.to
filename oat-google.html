<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oat UI Project</title>

    <!-- Oat UI CSS -->
    <link rel="stylesheet" href="https://unpkg.com/@knadh/oat/oat.min.css">
</head>
<body>

    <!-- A semantic header (styled automatically without classes) -->
    <header>
        <h1>My Oat Project</h1>
    </header>

    <!-- Main Content Area -->
    <main>
        <section>
            <h2>Hello, Oat!</h2>
            <p>This is a native HTML paragraph styled by Oat. No classes needed.</p>

            <!-- Standard Button styled by Oat -->
            <button>Click Me</button>
        </section>

        <section>
            <h2>Interactive Components</h2>
            <!-- Example of a dynamically styled form -->
            <form>
                <fieldset>
                    <legend>User Preferences</legend>
                    <label>
                        Username
                        <input type="text" placeholder="Enter name">
                    </label>
                </fieldset>
            </form>
        </section>
    </main>

    <!-- Oat UI JavaScript (Required for dynamic Web Components like tabs, dropdowns, tooltips) -->
    <script src="https://unpkg.com/@knadh/oat/oat.min.js" defer></script>
</body>
</html>
